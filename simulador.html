<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Crédito</title>
    <link rel="stylesheet" href="simulador.css">
    
</head>
<body>

    <div class="container">
        <div class="header">
    <h1>Cooperativa Financiera</h1>
    <img src="logo.png" class="logo">
</div>

<div class="grid">

    <!-- BLOQUE 1 -->
    <div class="card">
        <h2>Capacidad de Crédito</h2>

        <label for="txtIngresos">Ingresos:</label>
        <input type="text" id="txtIngresos">

        <label for="txtEgresos">Egresos:</label>
        <input type="text" id="txtEgresos">

        <p>Disponible: <span id="spnDisponible"></span></p>
        <p>Capacidad de pago mensual: <span id="spnCapacidadPago"></span></p>
        <p> </p>
        <button onclick="calcular1();" id="btnCalcularCredito">Calcular Capacidad de Crédito</button> 
        <button onclick="reiniciar1();" id="btnReiniciar">Reiniciar</button>
    </div>

    <!-- BLOQUE 2 -->
    <div class="card">
        <h2>Solicitud de Crédito</h2>

        <label for="txtMonto">Monto:</label>
        <input type="text" id="txtMonto">

        <label for="txtPlazo">Plazo en años:</label>
        <input type="text" id="txtPlazo">

        <label for="txtTasaInteres">Tasa de interés:</label>
        <input type="text" id="txtTasaInteres">

        <p>Interés a pagar: <span id="spnInteresPagar"></span></p>
        <p>Total préstamo: <span id="spnTotalPrestamo"></span></p>
        <p>Cuota mensual: <span id="spnCuotaMensual"></span></p>
        <p>Estado de crédito: <span id="spnEstadoCredito">ANALIZANDO...</span></p>
        <div class="buttons"> 
            <button onclick="calcular();" id="btnCalcularCredito">Calcular Solicitud de Crédito</button> 
            <button onclick="reiniciar()"  id="btnReiniciar">Reiniciar</button>
    </div>

</div>
        </div>
    </div>

    <script src="funciones.js"></script>
    <script src="simulador.js"></script>

</body>
</html>
